# Where to store files
work_dir: $PRESTOS/example/

# Full print outs or not
verbose: False

# Restart from checkpoint (path to directory containing solver_checkpoint.pkl)
restart: None

# Platform configuration (environment + execution)
platform: 
  name: local
  args: {
    mpi_tasks: 1,
    threads_per_task: 2
  }

# Initial plasma state: point to a GACODE profiles file
state:
  args:
    from_gacode: $PRESTOS/example/input.gacode # _H_HighColl_179449_1500

boundary:
  class: fixedinitial
  args:
    sigma: 0.1
    
# Parameter model (optional in current solver flow)
parameterizations:
  class: spline
  args:
    knots:  [0.88, 0.91, 0.94, 0.97] # alt: n_params_per_prof: []
    spline_type: linear #pchip for defined on y, akima for defined on aLy
    defined_on: aLy
    include_zero_grad_on_axis: True
    sigma: 0.1 # relative uncertainty on parameters, 1 sigma
    # lcfs_aLti_in_params: False

neutrals:
  class: diffusive
  args:
    n0_edge: None #[1e-2,1e-8] # 1e19/m^3

transport:
  class: tglf
  args:
    modes: all
    sigma: 0.1 # relative uncertainty on transport model, 1 sigma
    exb_on: True
    exb_source: state
    exb_scale: 1
    neoclassical_model: neo
    # Evaluation logging for surrogate warm-start and cross-user sharing
    log_evaluations: True  # Enable automatic logging of all evaluations
    evaluation_log:
      enabled: True
      # path: ./logs/transport_evaluations.db  # Local database (default)
      # path: /shared/prestos/transport_eval.db  # Shared network database
      # If not specified, uses environment variable PRESTOS_EVAL_LOG or default
    
    NEO_options:
      keep_files: minimal
      settings: {}
      multipliers: {}
    TGLF_options:
      keep_files: minimal
      settings: {
        SAT_RULE: 2,
        UNITS: CGYRO,
        USE_BPER: False,
        USE_BPAR: False,
        # ADIABATIC_ELEC: FALSE,
        #NBASIS_MIN: 2,
        #NBASIS_MAX: 8,         
        # NWIDTH: 40,
        #WIDTH: 2.,
        #WIDTH_MIN: 0.2,
        # NXGRID: 24,
        NKY: 19,
        KY: 0.3,
        KYGRID_MODEL: 1, # or 4 for SAT2/3
        # FILTER: 1.0,
        # USE_INBOARD_DETRAPPED: True,
        # WD_ZERO: 0.01,
        # DAMP_PSI: 0.1,
        # DAMP_SIG: 0.1,
        XNU_MODEL: 3, # 2 for SAT0/1
        # KX0_LOC: 0, # Kx0/ky ballooning mode offset
        # ALPHA_ZF: -1, # avoid unphysical low ky peaks
        #USE_MHD_RULE: True,
        # USE_AVE_ION_GRID: True,
        }
      multipliers: {}
    QLGYRO_options: 
      keep_files: minimal
      settings: {
        SAT_RULE: 3,
        KYGRID_MODEL: 4,
        }
      multipliers: {}
    CGYRO_options:
      keep_files: minimal
      settings: {
        NONLINEAR_FLAG: 0,
        UP_THETA: 1.25,
        UP_RADIAL: 1.25,
        UP_ALPHA: 1.25,
        ERROR_TOL: 5E-4,
        FREQ_TOL: 5E-2,
        DELTA_T_METHOD: 1,
        #DELTA_T: 0.01,
        KY: 0.05,
        N_TOROIDAL: 24,
        BOX_SIZE: 4,
        TOROIDALS_PER_PROC: 6,
        }
      linear_ky_scan: {
        min: 0.1,
        max: 2.0,
        n: 20
      }
      multipliers: {}


targets:
  class: analytic
  args:
    scale_Pe_beam: 1.0
    scale_Pi_beam: 1.0
    scale_Qpar_wall: 1.0
    scale_Qpar_beam: 1.0
    sigma: 0.1 # relative uncertainty on targets, 1 sigma

solver:
  class: relax
  args:
    # map your predicted profiles to target variables from transport/targets
    predicted_profiles: [ne,te,ti]
    # target_vars is auto-derived from output_units when omitted:
    #   flow+total → [Ce, Pe, Pi] | flow+conduction → [Ce, De, Di] | flux+* → [Ge, Qe, Qi]
    # Override here only if you need non-standard channels.
    # target_vars: [Ce, Pe, Pi]
    # Unit system used for flux/flow matching in the residual.
    # flux_or_flow    : 'flux' (MW/m² or 1e19/m²/s) | 'flow' (MW or 1e19/s, surface-integrated)
    # gB_or_real      : 'gB' (dimensionless gyroBohm) | 'real' (physical units)
    # total_or_conduction : 'total' (full heat) | 'conduction' (total minus convection)
    #                       Applies to Te/Ti heat channels only; requires particle-flux output.
    output_units:
      flux_or_flow: flow
      gB_or_real: gB
      total_or_conduction: total
    roa_eval:  [0.88, 0.91, 0.94, 0.97]
    domain: [0.88, 1.0]
    tol: 1e-6
    model_iter_to_stall: 5
    max_iter: 100
    use_oscillation_convergence: True
    use_surrogate: True
    surrogate_warmup: 5
    surrogate_retrain_every: 5
    use_jacobian: False
    objective: mse
    normalize_residual: True # normalizes ith component by abs(target[i])
    residual_weights:
      flux: 1.0
      boundary_conditions: 0.0
      constraints: 0.0
    scale_objective: True # divides total by N_channels
    step_size: 0.5
    min_step_size: 1e-6
    adaptive_step: True
    bounds:  [0.0,100.] # [[0,200],[0,5],[0.9,1.0],[0.01,1.0]] # [[1.01,2], [0,10], [0.9,1.1]] # 
    # [[0,10],[0,15],[0,25],[0,50],[0,100]]  # [0,100] #

        # two element list applied to all parameters or list of n_parameters tuples
        # alt bounds formats: {ne:[0,100],te:[0,100],ti:[0,100]} OR 
        #       [[lower,upper] for n_params_per_profile] OR
        #       {predicted_profile[i]:[lower bound, upper bound],...}
        #   more customized options not yet implemented

    # constraints:
    #   - location: 0.88
    #     expression: "Ti/Te = Pi/Pe"
    #     weight: 1.0
    #     norm: log        # optional
    #     enforcement: ramp # or exact
    #     sigma: 0.05
    #   - location: 0.88
    #     expression: "ne >= 3.0" # assume 1e19 m^-3
    #     weight: 0.5
    #     norm: None
    #     enforcement: ramp # or exact
    #     sigma: 0.05

# Optional single-output surrogate (currently unused by default)
# Optional: Surrogate configuration with warm-start
surrogate:
  class: SurrogateManager
  args:
    warm_start: False  # Enable to pre-train surrogates from evaluation log
    type: gp
    mode: local
    use_mean_function: True
    # Unit system the surrogate is *trained on* and *predicts in* internally.
    # SurrogateManager converts from these units to the solver's output_units before
    # returning predictions, so the residual always sees consistent units.
    # flux_or_flow    : 'flux' | 'flow'
    # gB_or_real      : 'gB'   | 'real'
    # total_or_conduction : 'total' | 'conduction'
    train_units:
      flux_or_flow: flux
      gB_or_real: gB
      total_or_conduction: total
    kwargs:
      ard: True

    
    # Warm-start configuration (if enabled):
    #warm_start_model_class: transport.Tglf  # Required: which model to query
    #warm_start_model_settings: {
    #  SAT_RULE: 0}  # Optional: filter on specific settings
    # Examples of flexible settings filtering:
    #   {}                           # Match ANY settings (most data)
    #   {SAT_RULE: 3}               # Only SAT_RULE=3 (other settings any)
    #   {SAT_RULE: [2, 3]}          # SAT_RULE is 2 OR 3
    #   {SAT_RULE: 3, USE_BPER: True}  # Both must match
    
    #warm_start_max_entries: 5000  # Max evaluations to load from log
    #evaluation_log_path: ./logs/transport_evaluations.db  # Override default
